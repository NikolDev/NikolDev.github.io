<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>FLOFYAPPS</title>
    <link rel="icon" href="./icon/Logotips.png">
  </head>
  <body>
    <header class="head-row">
      <div class="wrapper">
        <div class="nav-menu">
          <div class="name">
            <a href="#">FLOFYAPPS</a>
          </div>

          <div class="nav">
            <ul>
              <li>
                <a href="https://t.me/PlayGameFB">Телеграм</a>
              </li>
              <li>
                <a href="https://t.me/PlayGameFB/277">Сайт</a>
              </li>
              <li>
                <a href="https://play.google.com/store/apps/dev?id=8009688118823042064">Google Play</a>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </header>

    <div class="container">
      <h1 class="countdown">Countdown to New Year 2024</h1>
    </div>
    <div class="timer">
      <div class="countdown-container">
        <div class="time day">100</div>
        <span class="text">Days</span>
      </div>
      <div class="countdown-container">
        <div class="time hour">100</div>
        <span class="text">Hours</span>
      </div>
      <div class="countdown-container">
        <div class="time minute">100</div>
        <span class="text">Minutes</span>
      </div>
      <div class="countdown-container">
        <div class="time seconds">100</div>
        <span class="text">Seconds</span>
      </div>
    </div>
    <div class="footer">
      <div class="content">
        <p>Copyright © 2023 by <span class="company">FLOFYAPPS.</span> All rights reserved</p>
      </div>
    </div>

  <script src="./source/app.js"></script>
  <script src="./source/showstorm.js"></script>
